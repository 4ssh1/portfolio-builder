services:
# database
  mongodb-local:
    image: mongo:latest
    container_name: mongodb-local
    ports:
      - "2701:2701"
    env_file:
      - .env.dev
    volumes:
    # perssist branch metadata per git branch
      - ./data/mongodb:/data/db
      - ./.git/HEAD:/tmp/.git/HEAD:ro,consistent
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]      
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-builder
# nodeJS application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: portfolio-builder-app
    ports:
      - "${PORT:-3000}:3000"
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   PORT: ${PORT:-3000}
    #   REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    #   ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
    env_file:
      - .env.dev
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb-local:
        condition: service_healthy
    networks:
      - portfolio-builder
    restart: unless-stopped

networks:
  portfolio-builder:
    driver: bridge